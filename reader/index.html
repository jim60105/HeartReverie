<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdn.tailwindcss.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:;">
    <title>HeartReverie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Iansui&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Noto+Color+Emoji&display=swap" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"
            integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js"
            integrity="sha384-pcBjnGbkyKeOXaoFkmJiuR9E08/6gkmus6/Strimnxtl3uk0Hx23v345pWyC/MMr"
            crossorigin="anonymous"></script>
    <style>
        :root {
            color-scheme: dark;
            --header-height:     34px;
            --panel-bg:          linear-gradient(145deg, #1a0810, #220c16);
            --border-color:      #6d1a2a;
            --border-inner:      rgba(255, 80, 120, 0.15);
            --header-bg:         linear-gradient(180deg, #2a0d18 0%, #1a0810 100%);
            --header-border:     #6d1a2a;
            --section-head-bg:   #3a1020;
            --section-head-hover: #5a1830;
            --text-main:         rgba(207, 207, 197, 1);
            --text-name:         #ff8aaa;
            --text-title:        #e05070;
            --text-label:        #ff7a96;
            --item-bg:           rgba(255, 255, 255, 0.04);
            --item-scene-bg:     rgba(180, 30, 60, 0.18);
            --item-border:       rgba(110, 26, 42, 0.6);
            --divider:           rgba(110, 26, 42, 0.7);
            --btn-bg:            rgba(255, 255, 255, 0.04);
            --btn-border:        rgba(110, 26, 42, 0.8);
            --btn-hover-bg:      rgba(180, 30, 60, 0.22);
            --btn-hover-border:  #a0243c;
            --btn-active-bg:     rgba(180, 30, 60, 0.12);
            --text-italic:       rgba(145, 145, 145, 1);
            --text-underline:    rgba(145, 145, 145, 1);
            --text-quote:        rgba(198, 193, 151, 1);
            --shadow-color:      rgba(0, 0, 0, 0.9);
            --shadow-width:      2px;
            --border-outer:      rgba(0, 0, 0, 1);
            --reading-tint:      rgba(29, 33, 40, 0.9);
            --font-base:         clamp(0.8rem, 2.5vw, 0.95rem);
            --font-system-ui:    Noto Sans TC, Noto Sans JP, Noto Sans SC, Noto Sans,
                Noto Color Emoji, Microsoft JhengHei, Heiti TC, system-ui, sans-serif;
            --font-antique:      Iansui, Superclarendon, "Bookman Old Style", "URW Bookman",
                "URW Bookman L", "Georgia Pro", Georgia, serif;
        }

        body {
            font-family: var(--font-system-ui);
            font-size: var(--font-base);
            background-color: #0f0a0c;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-main);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
            pointer-events: none;
        }

        h1, h2, h3, h4, h5, h6,
        .char-name, .item-label, .fold-header, #folder-name {
            font-weight: normal;
            line-height: normal;
            font-family: var(--font-antique), var(--font-system-ui);
        }

        ::selection {
            background: rgba(180, 30, 60, 0.6);
            color: #fff;
        }
        ::-moz-selection {
            background: rgba(180, 30, 60, 0.6);
            color: #fff;
        }

        /* Collapsible transition styles */
        details summary {
            cursor: pointer;
            user-select: none;
            list-style: none;
        }
        details summary::-webkit-details-marker {
            display: none;
        }

        /* Story selector panel — hide default arrow */
        #story-selector-details > summary::before {
            display: none;
        }

        /* Summary arrow indicator */
        details summary::before {
            content: '▶';
            display: inline-block;
            margin-right: 0.4em;
            font-size: 0.7em;
            transition: transform 0.25s ease;
        }
        details[open] summary::before {
            transform: rotate(90deg);
        }

        /* ── Animation ── */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Status Panel Layout: Two-Column ── */
        .content-wrapper {
            display: grid;
            grid-template-columns: minmax(0, 48rem) 1fr;
            gap: 1.5rem;
            width: 100%;
            max-width: 80rem;
            margin: 0 auto;
            align-items: start;
        }
        #sidebar {
            position: sticky;
            top: calc(var(--header-height) + 8px);
            max-height: calc(100vh - var(--header-height) - 16px);
            overflow-y: auto;
            scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar {
            display: none;
        }
        #sidebar:empty {
            display: none;
        }
        @media (max-width: 767px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
            #sidebar {
                position: static;
                max-height: none;
                overflow-y: visible;
            }
        }
        .status-float {
            /* No float — lives in sidebar column */
        }
        .main-card {
            width: 100%;
            box-sizing: border-box;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            outline: 1px solid rgba(255, 80, 120, 0.08);
            border-radius: 16px;
            padding: clamp(10px, 3vw, 16px);
            margin: 1rem 0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 100, 120, 0.1);
            animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        .char-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--header-bg);
            border: 1px solid var(--header-border);
            border-radius: 12px;
            padding: clamp(8px, 2.5vw, 12px);
            margin-bottom: 10px;
            text-align: center;
            box-shadow: inset 0 0 12px rgba(255, 50, 80, 0.08);
        }
        .char-name {
            color: var(--text-name);
            font-weight: normal;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            line-height: 1.2;
            text-shadow: 0 0 16px rgba(255, 100, 140, 0.5),
                         0 2px 4px rgba(0, 0, 0, 0.6);
            margin-bottom: 4px;
        }
        .char-title {
            color: var(--text-title);
            font-weight: 600;
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            font-style: italic;
            position: relative;
            padding: 0 18px;
        }
        .char-title::before,
        .char-title::after {
            content: '';
            display: block;
            width: 12px;
            height: 1px;
            background: var(--text-title);
            opacity: 0.6;
            position: absolute;
            top: 50%;
        }
        .char-title::before { left: 0; }
        .char-title::after  { right: 0; }

        .stats-container {
            background: var(--item-bg);
            border-radius: 8px;
            padding: 2px 10px;
            margin-bottom: 10px;
            border: 1px solid var(--item-border);
        }
        .grid-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }
        @media (min-width: 350px) {
            .grid-info.two-col { grid-template-columns: 1fr 1fr; }
        }
        .info-item {
            background: var(--item-bg);
            border: 1px solid var(--item-border);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 0.9em;
            display: flex;
            align-items: flex-start;
            line-height: 1.4;
        }
        .item-label {
            color: var(--text-label);
            font-weight: bold;
            margin-right: 4px;
            white-space: nowrap;
        }
        .scene-box {
            grid-column: 1 / -1;
            background: var(--item-scene-bg);
            border-color: rgba(180, 30, 60, 0.5);
        }
        .plain-box { grid-column: 1 / -1; }
        .emoji-icon {
            margin-right: 5px;
            filter: hue-rotate(330deg) saturate(1.2);
        }
        .stat-val {
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.9em;
            word-break: break-word;
        }
        .stat-row {
            display: flex;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px dashed var(--divider);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label {
            color: var(--text-label);
            font-weight: bold;
            font-size: 0.9em;
            margin-right: 6px;
            flex-shrink: 0;
        }

        /* ── Fold / Collapsible Sections ── */
        .fold-section {
            margin-top: 8px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .fold-header {
            background: var(--section-head-bg);
            padding: 7px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
            color: var(--text-name);
            cursor: pointer;
            user-select: none;
            transition: background 0.25s, color 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .fold-header:hover {
            background: var(--section-head-hover);
            color: #ffd0dc;
        }
        .fold-icon {
            font-size: 0.8em;
            transition: transform 0.3s ease;
        }
        details[open] > .fold-header .fold-icon {
            transform: rotate(0deg);
        }
        details:not([open]) > .fold-header .fold-icon {
            transform: rotate(-90deg);
        }
        .fold-content {
            background: rgba(255, 255, 255, 0.02);
            padding: 8px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.5s ease-in-out, padding 0.5s ease, opacity 0.3s ease;
        }
        details[open] > .fold-content {
            max-height: 2000px;
            opacity: 1;
        }
        details:not([open]) > .fold-content {
            padding-top: 0;
            padding-bottom: 0;
        }

        /* Override generic details summary arrow for fold sections */
        .fold-section > summary::before {
            display: none;
        }

        /* ── Options Panel ── */
        @keyframes pulse-glow {
            0%   { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 100, 120, 0.1); }
            50%  { box-shadow: 0 15px 30px rgba(180, 30, 60, 0.4), inset 0 1px 0 rgba(255, 100, 120, 0.15); }
            100% { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 100, 120, 0.1); }
        }
        .era-actions-container {
            width: 100%;
            box-sizing: border-box;
            margin: 1rem 0;
            padding: clamp(12px, 3.5vw, 20px) clamp(12px, 4vw, 22px);
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both,
                       pulse-glow 3s infinite ease-in-out;
        }
        .era-actions-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        .header-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #c23456, transparent);
            width: 100%;
            position: absolute;
            bottom: -8px;
            opacity: 0.5;
        }
        .era-actions-title {
            text-align: center;
            font-weight: bold;
            color: var(--text-name);
            margin: 0;
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            text-shadow: 0 0 12px rgba(255, 100, 140, 0.5);
            letter-spacing: 2px;
        }
        .era-action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(8px, 3vw, 14px);
        }
        .era-action-btn {
            position: relative;
            padding: clamp(10px, 3.5vw, 14px) 8px;
            font-size: clamp(0.72rem, 3vw, 0.85rem);
            font-weight: 600;
            color: var(--text-label);
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            overflow-wrap: break-word;
            word-break: break-word;
            min-height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-stack);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .era-action-btn:hover {
            background: var(--btn-hover-bg);
            border-color: var(--btn-hover-border);
            color: #ffd0dc;
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 6px 16px rgba(180, 30, 60, 0.3);
        }
        .era-action-btn:active {
            transform: translateY(-1px) scale(0.98);
            background: var(--btn-active-bg);
            box-shadow: 0 2px 8px rgba(180, 30, 60, 0.15);
        }
        .era-action-btn--empty {
            cursor: default;
            visibility: hidden;
        }
        .era-action-num {
            opacity: 0.6;
            margin-right: 0.3em;
            font-size: 0.9em;
        }

        /* Button hover effects */
        .themed-btn:hover {
            background: var(--btn-hover-bg) !important;
            border-color: var(--btn-hover-border) !important;
        }

        select option {
            background: #1a0810;
            color: var(--text-main);
        }

        /* ── Variable Display ── */
        .variable-content {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.82em;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            margin: 0;
            line-height: 1.5;
        }

        /* ── Prose content styling ── */
        #content {
            padding: 0 1rem;
        }
        #content p {
            margin-bottom: 0.8em;
            line-height: 1.8;
            text-shadow: var(--shadow-width) var(--shadow-width) 4px var(--shadow-color);
        }
        #content em {
            color: var(--text-italic);
        }
        #content u {
            color: var(--text-underline);
        }
        #content blockquote {
            color: var(--text-quote);
            border-left: 3px solid var(--text-quote);
            padding-left: 1em;
        }
        #content code {
            background: var(--item-bg);
            padding: 0.1em 0.3em;
            border-radius: 3px;
            font-size: 0.9em;
        }

        /* ── Vento Error Card ── */
        .vento-error-card {
            border: 2px solid #dc2626;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            background: rgba(220, 38, 38, 0.1);
        }
        .vento-error-header {
            font-weight: bold;
            color: #dc2626;
            margin-bottom: 8px;
        }
        .vento-error-message {
            font-family: monospace;
            white-space: pre-wrap;
            margin-bottom: 4px;
        }
        .vento-error-source {
            color: #666;
            font-size: 0.9em;
        }
        .vento-error-suggestion {
            color: #059669;
            margin-top: 8px;
        }

        /* ── Prompt Preview Panel ── */
        .panel-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 999;
        }
        .panel-backdrop.hidden { display: none; }
        .prompt-preview-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 33vw;
            height: 100vh;
            background: var(--bg-primary, #1a1a2e);
            border-right: 1px solid var(--border-color, #333);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .prompt-preview-panel.hidden { display: none; }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color, #333);
        }
        .preview-close-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1.2em;
        }
        .preview-meta {
            padding: 8px 16px;
            font-size: 0.85em;
            color: #888;
        }
        .preview-content {
            flex: 1;
            overflow: auto;
            padding: 16px;
            font-size: 0.85em;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── Prompt Editor Panel ── */
        .prompt-editor-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 33vw;
            height: 100vh;
            background: var(--bg-primary, #1a1a2e);
            border-left: 1px solid var(--border-color, #333);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .prompt-editor-panel.hidden { display: none; }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .editor-header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .editor-close-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1.2em;
        }
        .editor-btn-sm {
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #555;
            background: rgba(255,255,255,0.08);
            color: #ccc;
            cursor: pointer;
            font-size: 0.85em;
        }
        .editor-btn-sm:hover { background: rgba(255,255,255,0.15); }
        .editor-variables {
            flex-shrink: 0;
            margin-bottom: 10px;
        }
        .editor-variables-label {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 6px;
        }
        .editor-hint { color: #666; font-size: 0.85em; }
        .variable-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .variable-pill {
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(96, 165, 250, 0.12);
            color: #60a5fa;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.8em;
            transition: background 0.15s;
        }
        .variable-pill:hover { background: rgba(96, 165, 250, 0.3); }
        .variable-pill.pill-core { border-color: #555; color: #93c5fd; }
        .variable-pill.pill-plugin { border-color: #4a6; color: #6ee7b7; background: rgba(110, 231, 183, 0.1); }
        .variable-pill.pill-plugin:hover { background: rgba(110, 231, 183, 0.25); }
        .editor-textarea-wrap {
            flex: 1;
            min-height: 0;
            margin-bottom: 10px;
        }
        .editor-textarea {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.85em;
            line-height: 1.5;
            resize: none;
            tab-size: 2;
        }
        .editor-textarea:focus { outline: none; border-color: #60a5fa; }
        .editor-actions {
            flex-shrink: 0;
        }
        .editor-btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid #555;
            background: rgba(255,255,255,0.1);
            color: inherit;
            cursor: pointer;
            width: 100%;
        }
        .editor-btn:hover { background: rgba(255,255,255,0.18); }
        .chat-tool-btn {
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid #444;
            background: rgba(255,255,255,0.05);
            color: inherit;
            cursor: pointer;
            font-size: 0.85em;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Passphrase Gate Overlay -->
    <div id="passphrase-overlay" class="hidden flex items-center justify-center" style="position: fixed; inset: 0; z-index: 9999;
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
        <div style="background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 16px;
            padding: 2rem; max-width: 400px; width: 90%; text-align: center;">
            <h2 style="color: var(--text-title); margin-bottom: 1rem; font-family: var(--font-system-ui);">🔒 通行密語</h2>
            <form id="passphrase-form">
            <input type="text" autocomplete="username" value="reader" hidden aria-hidden="true">
            <input id="passphrase-input" type="password" autocomplete="current-password" placeholder="輸入通行密語…"
                style="width: 100%; padding: 10px; background: var(--item-bg); border: 1px solid var(--item-border);
                       border-radius: 8px; color: var(--text-main); font-size: var(--font-base);
                       font-family: var(--font-system-ui); box-sizing: border-box; margin-bottom: 12px;">
            <div style="display: flex; justify-content: center; gap: 8px; align-items: center;">
                <span id="passphrase-error" class="text-sm" style="color: #ff6b6b;"></span>
                <button id="passphrase-submit" type="submit" class="themed-btn px-4 py-2 rounded text-sm font-medium transition-colors"
                    style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);">
                    進入
                </button>
            </div>
            </form>
        </div>
    </div>

    <!-- Header: Folder Picker + Story Selector -->
    <header class="sticky top-0 z-10 px-3 py-1 border-b flex items-center gap-2 flex-wrap"
            style="background: var(--header-bg); border-color: var(--header-border);">
        <button id="btn-pick-folder"
                class="themed-btn px-3 py-1 rounded text-sm font-medium transition-colors"
                style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);">
            📂 選擇資料夾
        </button>

        <!-- Story Selector -->
        <details id="story-selector-details" style="position: relative;">
            <summary class="themed-btn px-3 py-1 rounded text-sm font-medium transition-colors"
                     style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name); cursor: pointer; list-style: none;">
                📖 故事選擇
            </summary>
            <div style="position: absolute; top: 100%; left: 0; margin-top: 4px; z-index: 20;
                        background: #1a0810; border: 1px solid var(--border-color); border-radius: 10px;
                        padding: 10px; min-width: 280px; box-shadow: 0 8px 24px rgba(0,0,0,0.6);">
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label class="text-xs" style="color: var(--text-label);">系列</label>
                    <select id="select-series"
                            style="background: var(--item-bg); border: 1px solid var(--item-border); border-radius: 6px;
                                   padding: 4px 8px; color: var(--text-main); font-size: var(--font-base); font-family: var(--font-system-ui);">
                        <option value="">-- 選擇系列 --</option>
                    </select>
                    <label class="text-xs" style="color: var(--text-label);">故事</label>
                    <select id="select-story"
                            style="background: var(--item-bg); border: 1px solid var(--item-border); border-radius: 6px;
                                   padding: 4px 8px; color: var(--text-main); font-size: var(--font-base); font-family: var(--font-system-ui);">
                        <option value="">-- 選擇故事 --</option>
                    </select>
                    <label class="text-xs" style="color: var(--text-label);">新故事名稱</label>
                    <input id="input-new-story" type="text" placeholder="輸入新故事名稱…"
                           style="background: var(--item-bg); border: 1px solid var(--item-border); border-radius: 6px;
                                  padding: 4px 8px; color: var(--text-main); font-size: var(--font-base); font-family: var(--font-system-ui);">
                    <div style="display: flex; gap: 6px; margin-top: 2px;">
                        <button id="btn-create-story"
                                class="themed-btn px-3 py-1 rounded text-sm font-medium transition-colors"
                                style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name); flex: 1;">
                            ✨ 建立
                        </button>
                        <button id="btn-load-story"
                                class="themed-btn px-3 py-1 rounded text-sm font-medium transition-colors"
                                style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name); flex: 1;">
                            📥 載入
                        </button>
                    </div>
                </div>
            </div>
        </details>

        <span id="folder-name" class="text-sm truncate" style="color: var(--text-label);">尚未選擇資料夾</span>
        <button id="btn-reload"
                class="hidden themed-btn px-2 py-1 rounded text-sm transition-colors"
                style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);"
                title="重新載入資料夾">
            🔄
        </button>
        <span class="flex-grow"></span>
        <button id="btn-prev"
                class="hidden themed-btn px-3 py-1 rounded text-sm font-medium transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);"
                disabled>
            ← 上一章
        </button>
        <span id="chapter-progress" class="hidden text-sm" style="color: var(--text-label);">0 / 0</span>
        <button id="btn-next"
                class="hidden themed-btn px-3 py-1 rounded text-sm font-medium transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);"
                disabled>
            下一章 →
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-4 py-6">
        <div class="content-wrapper">
            <div id="content">
                <section class="flex flex-col items-center justify-center py-20 text-center gap-4">
                    <h1 class="text-2xl font-bold" style="color: var(--text-title);">HeartReverie</h1>
                    <p style="color: var(--text-main);">點擊上方「選擇資料夾」按鈕，選取包含章節 <code class="px-1 rounded" style="background: var(--item-bg);">.md</code> 檔案的資料夾以開始閱讀。</p>
                    <p id="browser-warning" class="hidden text-sm mt-4 px-4 py-3 rounded border"
                       style="color: #ff6b6b; border-color: #6d1a2a; background: rgba(180,30,60,0.15);">
                        ⚠️ 您的瀏覽器不支援 File System Access API。請使用最新版的 Chrome、Edge 或 Opera 瀏覽器。
                    </p>
                </section>
            </div>
            <aside id="sidebar"></aside>
        </div>

        <!-- Chat Input (backend mode only) -->
        <div id="chat-input-area" class="hidden" style="max-width: 48rem; margin: 1rem auto; padding: 0 1rem;">
            <div style="background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px;">
                <textarea id="chat-message" rows="3" placeholder="輸入故事指令…"
                    style="width: 100%; resize: vertical; background: var(--item-bg); border: 1px solid var(--item-border);
                           border-radius: 8px; padding: 8px; color: var(--text-main); font-family: var(--font-system-ui);
                           font-size: var(--font-base); box-sizing: border-box;"></textarea>
                <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; align-items: center;">
                    <button id="btn-preview" title="Preview Prompt" class="chat-tool-btn">📝 Preview</button>
                    <button id="btn-editor" title="編排器" class="chat-tool-btn">🎛️ 編排器</button>
                    <span style="flex: 1;"></span>
                    <span id="chat-error" class="text-sm" style="color: #ff6b6b; align-self: center;"></span>
                    <button id="btn-chat-resend" class="themed-btn px-4 py-1 rounded text-sm font-medium transition-colors"
                        style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);">
                        🔄 重送
                    </button>
                    <button id="btn-chat-send" class="themed-btn px-4 py-1 rounded text-sm font-medium transition-colors"
                        style="background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-name);">
                        ✨ 發送
                    </button>
                </div>
            </div>
        </div>
    </main>
    <div id="panel-backdrop" class="panel-backdrop hidden"></div>

    <script type="module">
        import { initChapterNav, handleFolderSelect, handleNext, handlePrev, handleReload, tryRestoreSession, loadFromBackend, reloadFromBackendToLast, getBackendContext } from './js/chapter-nav.js';
        import { initStorySelector } from './js/story-selector.js';
        import { initChatInput, showChatInput, hideChatInput } from './js/chat-input.js';
        import { initPassphraseGate } from './js/passphrase-gate.js';
        import { showPromptPreview, initPromptPreview, hidePromptPreview } from './js/prompt-preview.js';
        import { toggleEditor, hideEditor, getEditorTemplate, initEditorState } from './js/prompt-editor.js';
        import { initPlugins } from './js/plugin-loader.js';

        // Fetch background config (non-blocking, no auth required)
        fetch('/api/config')
            .then(r => r.ok ? r.json() : Promise.reject(r.status))
            .then(cfg => {
                if (cfg.backgroundImage) {
                    document.body.style.backgroundImage = `url(${cfg.backgroundImage})`;
                }
            })
            .catch(() => { /* graceful degradation: use fallback background */ });

        // DOM references
        const btnPickFolder = document.getElementById('btn-pick-folder');
        const browserWarning = document.getElementById('browser-warning');

        // Unsupported browser detection
        if (!('showDirectoryPicker' in window)) {
            browserWarning.classList.remove('hidden');
            btnPickFolder.disabled = true;
            btnPickFolder.style.opacity = '0.3';
            btnPickFolder.style.cursor = 'not-allowed';
        }

        // Initialise chapter navigation with DOM element references
        initChapterNav({
            content: document.getElementById('content'),
            folderName: document.getElementById('folder-name'),
            btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'),
            btnReload: document.getElementById('btn-reload'),
            chapterProgress: document.getElementById('chapter-progress')
        }, {
            onChapterChange: ({ isLastChapter }) => {
                if (isLastChapter) {
                    showChatInput();
                } else {
                    hideChatInput();
                }
            }
        });

        // Wire event listeners
        btnPickFolder.addEventListener('click', async () => {
            hideChatInput();
            await handleFolderSelect();
        });
        document.getElementById('btn-prev').addEventListener('click', handlePrev);
        document.getElementById('btn-next').addEventListener('click', handleNext);
        document.getElementById('btn-reload').addEventListener('click', handleReload);

        // Prompt preview & editor buttons + backdrop
        const panelBackdrop = document.getElementById('panel-backdrop');
        initPromptPreview();

        function updateBackdrop() {
            const previewVisible = !document.getElementById('prompt-preview-panel')?.classList.contains('hidden');
            const editorVisible = !document.getElementById('prompt-editor-panel')?.classList.contains('hidden');
            panelBackdrop.classList.toggle('hidden', !previewVisible && !editorVisible);
        }

        function closeAllPanels() {
            hidePromptPreview();
            hideEditor();
            panelBackdrop.classList.add('hidden');
        }

        panelBackdrop.addEventListener('click', closeAllPanels);
        document.addEventListener('panel-closed', updateBackdrop);

        document.getElementById('btn-preview')?.addEventListener('click', () => {
            const ctx = getBackendContext();
            const message = document.getElementById('chat-message')?.value || '';
            showPromptPreview(ctx.series || '', ctx.story || '', message, getEditorTemplate());
            updateBackdrop();
        });
        document.getElementById('btn-editor')?.addEventListener('click', () => {
            toggleEditor();
            updateBackdrop();
        });

        // Passphrase gate — API-dependent initialization runs after unlock
        initPassphraseGate(document.getElementById('passphrase-overlay'), async () => {
            await initPlugins();
            await initEditorState();
            // Story selector
            initStorySelector({
                selectSeries: document.getElementById('select-series'),
                selectStory: document.getElementById('select-story'),
                inputNewStory: document.getElementById('input-new-story'),
                btnCreate: document.getElementById('btn-create-story'),
                btnLoad: document.getElementById('btn-load-story')
            }, {
                onLoad: async (series, story) => {
                    await loadFromBackend(series, story);
                    document.getElementById('story-selector-details').removeAttribute('open');
                }
            });

            // Chat input
            initChatInput({
                textarea: document.getElementById('chat-message'),
                sendBtn: document.getElementById('btn-chat-send'),
                resendBtn: document.getElementById('btn-chat-resend'),
                errorSpan: document.getElementById('chat-error'),
                chatArea: document.getElementById('chat-input-area')
            }, {
                getContext: () => getBackendContext(),
                getTemplate: () => getEditorTemplate(),
                onSent: async () => {
                    await reloadFromBackendToLast();
                }
            });

            // Attempt to restore saved directory on load
            if ('showDirectoryPicker' in window) {
                tryRestoreSession();
            }
        });
    </script>
</body>
</html>
