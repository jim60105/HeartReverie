id = "light"
label = "晴書紙本"
colorScheme = "light"
backgroundImage = "url('/assets/paper.webp')"

[palette]
header-height            = "34px"
page-bg                  = "#F5F0E6"
page-overlay             = "transparent"
panel-bg                 = "linear-gradient(145deg, #EDE4D4DD, #E8E0D0DD)"
border-color             = "#C8C0B4"
border-inner             = "rgba(90, 85, 78, 0.13)"
border-outer             = "rgba(55, 50, 45, 0.09)"
header-bg                = "linear-gradient(145deg, #EDE4D488, #E8E0D088)"
header-border            = "#C8C0B4"
section-head-bg          = "#E5DED288"
section-head-hover       = "#DDD6C888"
text-main                = "rgba(40, 36, 32, 1)"
text-name                = "#4A4540"
text-title               = "#3A3530"
text-label               = "#5C5650"
text-italic              = "rgba(100, 95, 88, 1)"
text-underline           = "rgba(100, 95, 88, 1)"
text-quote               = "rgba(95, 88, 78, 1)"
item-bg                  = "rgba(0, 0, 0, 0.04)"
item-scene-bg            = "rgba(90, 85, 78, 0.07)"
item-border              = "rgba(90, 85, 78, 0.18)"
divider                  = "rgba(90, 85, 78, 0.15)"
btn-bg                   = "rgba(0, 0, 0, 0.04)"
btn-border               = "rgba(90, 85, 78, 0.24)"
btn-hover-bg             = "rgba(90, 85, 78, 0.09)"
btn-hover-border         = "#4A4540"
btn-active-bg            = "rgba(90, 85, 78, 0.05)"
shadow-color             = "transparent"
shadow-width             = "1px"
selection-bg             = "rgba(90, 85, 78, 0.25)"
accent-glow              = "rgba(90, 85, 78, 0.14)"
accent-line              = "#5C5650"
text-hover               = "#2D2A28"
pill-bg                  = "rgba(70, 65, 60, 0.10)"
pill-hover-bg            = "rgba(70, 65, 60, 0.20)"
accent-shadow            = "rgba(90, 85, 78, 0.16)"
accent-border            = "rgba(90, 85, 78, 0.30)"
accent-inset             = "rgba(90, 85, 78, 0.08)"
accent-subtle            = "rgba(90, 85, 78, 0.05)"
accent-solid             = "#4A4540"
reading-tint             = "rgba(247, 242, 232, 0.96)"
settings-sidebar-width   = "200px"
settings-sidebar-bg      = "linear-gradient(180deg, #EDE7DB88 0%, #E8E2D688 100%)"
settings-sidebar-active-bg     = "rgba(90, 85, 78, 0.10)"
settings-sidebar-active-border = "var(--text-title)"
settings-content-padding = "24px"
font-base                = "clamp(0.8rem, 2.5vw, 0.95rem)"
font-system-ui           = "Noto Sans TC, Noto Sans JP, Noto Sans SC, Noto Sans, Noto Color Emoji, Microsoft JhengHei, Heiti TC, system-ui, sans-serif"
font-antique             = "Iansui, Superclarendon, \"Bookman Old Style\", \"URW Bookman\", \"URW Bookman L\", \"Georgia Pro\", Georgia, serif"
