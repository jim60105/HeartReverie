id = "light"
label = "晴書紙本"
colorScheme = "light"
backgroundImage = "linear-gradient(160deg, #F5F0E6 0%, #EDE7DB 40%, #E8E0D2 100%)"

[palette]
header-height            = "34px"
page-bg                  = "#F5F0E6"
page-overlay             = "transparent"
panel-bg                 = "linear-gradient(145deg, #EAE4D8, #E4DED2)"
border-color             = "#BEB2A2"
border-inner             = "rgba(135, 72, 90, 0.13)"
border-outer             = "rgba(55, 40, 30, 0.09)"
header-bg                = "linear-gradient(180deg, #EDE7DB 0%, #EAE4D8 100%)"
header-border            = "#BEB2A2"
section-head-bg          = "#DDD6C8"
section-head-hover       = "#D3CABC"
text-main                = "rgba(40, 36, 32, 1)"
text-name                = "#A03558"
text-title               = "#7C2B42"
text-label               = "#973250"
text-italic              = "rgba(108, 100, 92, 1)"
text-underline           = "rgba(108, 100, 92, 1)"
text-quote               = "rgba(120, 96, 52, 1)"
item-bg                  = "rgba(0, 0, 0, 0.04)"
item-scene-bg            = "rgba(135, 72, 90, 0.07)"
item-border              = "rgba(135, 72, 90, 0.20)"
divider                  = "rgba(135, 72, 90, 0.17)"
btn-bg                   = "rgba(0, 0, 0, 0.04)"
btn-border               = "rgba(135, 72, 90, 0.26)"
btn-hover-bg             = "rgba(135, 72, 90, 0.09)"
btn-hover-border         = "#973250"
btn-active-bg            = "rgba(135, 72, 90, 0.05)"
shadow-color             = "rgba(62, 44, 34, 0.22)"
shadow-width             = "1px"
selection-bg             = "rgba(135, 72, 90, 0.3)"
accent-glow              = "rgba(135, 72, 90, 0.35)"
accent-line              = "#973250"
text-hover               = "#5A2038"
pill-bg                  = "rgba(124, 43, 66, 0.10)"
pill-hover-bg            = "rgba(124, 43, 66, 0.22)"
accent-shadow            = "rgba(135, 72, 90, 0.18)"
accent-border            = "rgba(135, 72, 90, 0.35)"
accent-inset             = "rgba(135, 72, 90, 0.08)"
accent-subtle            = "rgba(135, 72, 90, 0.05)"
accent-solid             = "#7C2B42"
reading-tint             = "rgba(247, 242, 232, 0.96)"
settings-sidebar-width   = "200px"
settings-sidebar-bg      = "linear-gradient(180deg, #EDE7DB 0%, #EAE4D8 100%)"
settings-sidebar-active-bg     = "rgba(135, 72, 90, 0.10)"
settings-sidebar-active-border = "var(--text-title)"
settings-content-padding = "24px"
font-base                = "clamp(0.8rem, 2.5vw, 0.95rem)"
font-system-ui           = "Noto Sans TC, Noto Sans JP, Noto Sans SC, Noto Sans, Noto Color Emoji, Microsoft JhengHei, Heiti TC, system-ui, sans-serif"
font-antique             = "Iansui, Superclarendon, \"Bookman Old Style\", \"URW Bookman\", \"URW Bookman L\", \"Georgia Pro\", Georgia, serif"
