id = "light"
label = "淡雅晨光"
colorScheme = "light"
backgroundImage = ""

[palette]
header-height            = "34px"
panel-bg                 = "linear-gradient(145deg, #faf6f0, #f5efe8)"
border-color             = "#d4a8b0"
border-inner             = "rgba(180, 100, 130, 0.15)"
border-outer             = "rgba(0, 0, 0, 0.12)"
header-bg                = "linear-gradient(180deg, #f8f2ec 0%, #faf6f0 100%)"
header-border            = "#d4a8b0"
section-head-bg          = "#f0e6e0"
section-head-hover       = "#e8dcd4"
text-main                = "rgba(60, 55, 50, 1)"
text-name                = "#b44060"
text-title               = "#a03050"
text-label               = "#c04868"
text-italic              = "rgba(100, 95, 90, 1)"
text-underline           = "rgba(100, 95, 90, 1)"
text-quote               = "rgba(120, 100, 60, 1)"
item-bg                  = "rgba(0, 0, 0, 0.03)"
item-scene-bg            = "rgba(180, 100, 130, 0.08)"
item-border              = "rgba(180, 100, 130, 0.25)"
divider                  = "rgba(180, 100, 130, 0.3)"
btn-bg                   = "rgba(0, 0, 0, 0.04)"
btn-border               = "rgba(180, 100, 130, 0.4)"
btn-hover-bg             = "rgba(180, 100, 130, 0.1)"
btn-hover-border         = "#b85070"
btn-active-bg            = "rgba(180, 100, 130, 0.06)"
shadow-color             = "rgba(0, 0, 0, 0.15)"
shadow-width             = "1px"
reading-tint             = "rgba(250, 246, 240, 0.92)"
settings-sidebar-width   = "200px"
settings-sidebar-bg      = "linear-gradient(180deg, #f8f2ec 0%, #faf6f0 100%)"
settings-sidebar-active-bg     = "rgba(180, 100, 130, 0.1)"
settings-sidebar-active-border = "var(--text-title)"
settings-content-padding = "24px"
font-base                = "clamp(0.8rem, 2.5vw, 0.95rem)"
font-system-ui           = "Noto Sans TC, Noto Sans JP, Noto Sans SC, Noto Sans, Noto Color Emoji, Microsoft JhengHei, Heiti TC, system-ui, sans-serif"
font-antique             = "Iansui, Superclarendon, \"Bookman Old Style\", \"URW Bookman\", \"URW Bookman L\", \"Georgia Pro\", Georgia, serif"
