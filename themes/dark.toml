id = "dark"
label = "月硯墨靜"
colorScheme = "dark"
backgroundImage = "linear-gradient(160deg, #181818 0%, #1E1E1E 40%, #181818 100%)"

[palette]
header-height            = "34px"
page-bg                  = "#181818"
page-overlay             = "transparent"
panel-bg                 = "linear-gradient(145deg, #222222, #282828)"
border-color             = "#3E3E3E"
border-inner             = "rgba(160, 160, 160, 0.14)"
border-outer             = "rgba(0, 0, 0, 1)"
header-bg                = "linear-gradient(180deg, #2C2C2C 0%, #222222 100%)"
header-border            = "#3E3E3E"
section-head-bg          = "#2A2A2A"
section-head-hover       = "#343434"
text-main                = "rgba(204, 204, 204, 1)"
text-name                = "#B0B0B0"
text-title               = "#A8A8A8"
text-label               = "#989898"
text-italic              = "rgba(144, 144, 144, 1)"
text-underline           = "rgba(144, 144, 144, 1)"
text-quote               = "rgba(170, 170, 170, 1)"
item-bg                  = "rgba(255, 255, 255, 0.04)"
item-scene-bg            = "rgba(160, 160, 160, 0.08)"
item-border              = "rgba(160, 160, 160, 0.20)"
divider                  = "rgba(160, 160, 160, 0.20)"
btn-bg                   = "rgba(255, 255, 255, 0.04)"
btn-border               = "rgba(160, 160, 160, 0.30)"
btn-hover-bg             = "rgba(160, 160, 160, 0.12)"
btn-hover-border         = "#A8A8A8"
btn-active-bg            = "rgba(160, 160, 160, 0.08)"
shadow-color             = "rgba(0, 0, 0, 0.88)"
shadow-width             = "2px"
selection-bg             = "rgba(160, 160, 160, 0.30)"
accent-glow              = "rgba(180, 180, 180, 0.35)"
accent-line              = "#A8A8A8"
text-hover               = "#E0E0E0"
pill-bg                  = "rgba(160, 160, 160, 0.10)"
pill-hover-bg            = "rgba(160, 160, 160, 0.22)"
accent-shadow            = "rgba(160, 160, 160, 0.20)"
accent-border            = "rgba(160, 160, 160, 0.35)"
accent-inset             = "rgba(180, 180, 180, 0.08)"
accent-subtle            = "rgba(160, 160, 160, 0.06)"
accent-solid             = "#707070"
reading-tint             = "rgba(18, 18, 18, 0.93)"
settings-sidebar-width   = "200px"
settings-sidebar-bg      = "linear-gradient(180deg, #2C2C2C 0%, #222222 100%)"
settings-sidebar-active-bg     = "rgba(160, 160, 160, 0.15)"
settings-sidebar-active-border = "var(--text-title)"
settings-content-padding = "24px"
font-base                = "clamp(0.8rem, 2.5vw, 0.95rem)"
font-system-ui           = "Noto Sans TC, Noto Sans JP, Noto Sans SC, Noto Sans, Noto Color Emoji, Microsoft JhengHei, Heiti TC, system-ui, sans-serif"
font-antique             = "Iansui, Superclarendon, \"Bookman Old Style\", \"URW Bookman\", \"URW Bookman L\", \"Georgia Pro\", Georgia, serif"
