# Example values for deploying HeartReverie behind ingress-nginx.
#
# ingress-nginx terminates TLS at the ingress; the chart now always speaks
# plain HTTP upstream, so no `backend-protocol: HTTPS` annotation is needed.

env:
  LLM_API_KEY: "REPLACE-ME"
  PASSPHRASE: "REPLACE-ME"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: heart-reverie.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - heart-reverie.example.com
      secretName: heart-reverie-tls
