# Example values for deploying HeartReverie behind Traefik.
#
# Traefik terminates TLS at the ingress; the chart now always speaks plain
# HTTP upstream, so no `ServersTransport` CRD or `serversscheme: https`
# annotation is required.

env:
  LLM_API_KEY: "REPLACE-ME"
  PASSPHRASE: "REPLACE-ME"

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: heart-reverie.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - heart-reverie.example.com
      secretName: heart-reverie-tls
