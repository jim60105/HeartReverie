---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "heart-reverie.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "heart-reverie.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "heart-reverie.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.app.port }}
