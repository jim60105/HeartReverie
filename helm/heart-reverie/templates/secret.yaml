{{- if not .Values.secret.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "heart-reverie.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "heart-reverie.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Iterate operator-supplied env. Skip nil and empty-string-after-coercion;
         coerce everything else to string with toString | quote so booleans
         (false) and numerics (0) survive --set parsing. */ -}}
  {{- range $key, $value := .Values.env }}
  {{- if not (eq $value nil) }}
  {{- $coerced := toString $value }}
  {{- if ne $coerced "" }}
  {{ $key }}: {{ $coerced | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- /* PORT is no longer injected here; it is rendered as a plain container
         env in the Deployment (sourced directly from .Values.app.port) so
         that operators using secret.existingSecret do not need to remember
         to add PORT to their external Secret. */ -}}
  {{- /* Inject PROMPT_FILE when prompts are enabled and the operator did not
         set env.PROMPT_FILE explicitly. The injected path is
         <prompts.mountPath>/<first-filename>. */ -}}
  {{- $userPromptFile := "" }}
  {{- if hasKey .Values.env "PROMPT_FILE" }}
  {{- $userPromptFile = toString (index .Values.env "PROMPT_FILE") }}
  {{- end }}
  {{- if and .Values.prompts.enabled (eq $userPromptFile "") }}
  {{- $files := .Values.prompts.files | default dict }}
  {{- $names := keys $files | sortAlpha }}
  {{- if gt (len $names) 0 }}
  {{- $first := index $names 0 }}
  PROMPT_FILE: {{ printf "%s/%s" .Values.prompts.mountPath $first | quote }}
  {{- end }}
  {{- end }}
{{- end }}
